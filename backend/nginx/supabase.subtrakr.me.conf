# nginx-proxy config for the self-hosted Supabase stack.
# Lives on the VPS at /var/www/nginx-proxy/conf.d/subtrakr-supabase.conf —
# copied there by the deploy workflow, not auto-discovered.
server {
    listen 80;
    server_name supabase.subtrakr.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name supabase.subtrakr.me;

    ssl_certificate     /etc/letsencrypt/live/supabase.subtrakr.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/supabase.subtrakr.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 15M;

    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        set $upstream subtrakr_kong;
        proxy_pass         http://$upstream:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
