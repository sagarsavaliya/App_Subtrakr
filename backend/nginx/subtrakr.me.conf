# nginx-proxy config for the SubTrakr web app (landing + consumer app +
# super admin, one Next.js container). Lives on the VPS at
# /var/www/nginx-proxy/conf.d/subtrakr-web.conf — copied there by the
# deploy-web workflow, not auto-discovered.
server {
    listen 80;
    server_name subtrakr.me www.subtrakr.me app.subtrakr.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://subtrakr.me$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.subtrakr.me app.subtrakr.me;

    ssl_certificate     /etc/letsencrypt/live/subtrakr.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/subtrakr.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # One canonical host — www and the app subdomain both fold into it
    # (the app lives at subtrakr.me/app).
    return 301 https://subtrakr.me$request_uri;
}

server {
    listen 443 ssl;
    server_name subtrakr.me;

    ssl_certificate     /etc/letsencrypt/live/subtrakr.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/subtrakr.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 10M;

    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        set $upstream subtrakr_web;
        proxy_pass         http://$upstream:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
