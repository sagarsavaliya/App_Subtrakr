name: subtrakr-supabase

services:
  db:
    image: supabase/postgres:15.14.1.150
    container_name: subtrakr_db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: 3600
    volumes:
      - subtrakr_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - subtrakr_net

  auth:
    image: supabase/gotrue:v2.193.0
    container_name: subtrakr_auth
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: https://supabase.subtrakr.me
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: https://supabase.subtrakr.me
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      # false is deliberate, NOT a leftover default: with this true, GoTrue
      # auto-confirms + auto-logs-in signInWithOtp()'s user immediately on
      # request, before any code is sent or verified -- confirmed via a
      # live auth-log audit trail showing signup+login complete in the
      # same second, with no OTP ever entered. That's also why Brevo
      # looked broken: GoTrue never even attempted to send anything, since
      # nothing needed confirming. False forces a real send+verify round
      # trip. (Phone's autoconfirm is the separate GOTRUE_SMS_AUTOCONFIRM
      # setting below and is unaffected by this.)
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      # This doubles as the From address on every auth email GoTrue sends
      # (OTP codes, password recovery) — needs to be verified as a sender
      # (or the subtrakr.me domain SPF/DKIM-verified) in Brevo, or sends
      # will bounce/spam-fold regardless of the SMTP creds being correct.
      GOTRUE_SMTP_ADMIN_EMAIL: no-reply@subtrakr.me
      GOTRUE_SMTP_SENDER_NAME: SubTrakr
      # Brevo SMTP relay — enables password-recovery emails (previously no
      # SMTP was configured at all, so GoTrue couldn't send any mail).
      # Values live only in this VPS's own .env, never in git.
      GOTRUE_SMTP_HOST: ${BREVO_SMTP_HOST}
      GOTRUE_SMTP_PORT: ${BREVO_SMTP_PORT}
      GOTRUE_SMTP_USER: ${BREVO_SMTP_USER}
      GOTRUE_SMTP_PASS: ${BREVO_SMTP_PASS}
      # signInWithOtp()'s email defaults to a clickable magic link — this
      # swaps in a typed 6-digit code ({{ .Token }}) so the email flow
      # matches the WhatsApp OTP flow's UX. GoTrue fetches this template
      # live over HTTP each send, so it's just a public static file, no
      # secret involved.
      GOTRUE_MAILER_TEMPLATES_MAGIC_LINK: https://subtrakr.me/email-templates/otp.html
      GOTRUE_MAILER_SUBJECTS_MAGIC_LINK: "Your SubTrakr verification code"
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: "false"
      # Mobile number + 6-digit PIN is the primary credential (PRD F1).
      # Verification is WhatsApp-only by design (no SMS gateway, ever —
      # avoids India DLT registration and SMS compliance overhead) via the
      # app's own custom phone_otp_challenges system (web/src/lib/
      # otpChallenge.ts + whatsapp.ts). GoTrue's native phone/SMS OTP is
      # never used at all, so SMS_AUTOCONFIRM stays permanently "true" —
      # signUp({phone, password}) in complete-signup/route.ts only runs
      # AFTER our own WhatsApp verification already passed, so GoTrue
      # auto-confirming it immediately is correct, not a gap.
      GOTRUE_EXTERNAL_PHONE_ENABLED: "true"
      GOTRUE_SMS_AUTOCONFIRM: "true"
      GOTRUE_PASSWORD_MIN_LENGTH: "6"
    networks:
      - subtrakr_net

  rest:
    image: postgrest/postgrest:latest
    container_name: subtrakr_rest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    networks:
      - subtrakr_net

  meta:
    image: supabase/postgres-meta:v0.96.6
    container_name: subtrakr_meta
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - subtrakr_net

  storage:
    image: supabase/storage-api:latest
    container_name: subtrakr_storage
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: 10485760
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: subtrakr
      REGION: local
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "false"
    volumes:
      - subtrakr_storage_data:/var/lib/storage
    networks:
      - subtrakr_net

  kong:
    image: kong:2.8
    container_name: subtrakr_kong
    restart: unless-stopped
    depends_on:
      - auth
      - rest
      - storage
      - meta
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
    volumes:
      - ./kong.yml:/var/lib/kong/kong.yml:ro
    networks:
      - subtrakr_net

networks:
  subtrakr_net:
    name: subtrakr_net

volumes:
  subtrakr_db_data:
  subtrakr_storage_data:
