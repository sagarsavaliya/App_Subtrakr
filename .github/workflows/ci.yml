name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    # GitHub-hosted runner — this job doesn't touch the VPS, no reason to
    # tie up the self-hosted runner with routine checks.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          # Pinned to the exact version this project is developed against
          # (channel: stable floats to whatever's newest, which can silently
          # start failing CI when Flutter ships stricter default lints).
          flutter-version: '3.41.9'
          cache: true

      # .env is gitignored (real Supabase credentials) but declared as a
      # pubspec asset — the file must exist on disk (content doesn't matter
      # for analyze/test) or `flutter analyze` fails with asset_does_not_exist.
      - run: cp .env.example .env

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test
