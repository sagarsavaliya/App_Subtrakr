<!DOCTYPE html>
<html>
  <body style="margin:0;padding:0;background:#0a1614;font-family:-apple-system,Segoe UI,Roboto,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0a1614;padding:32px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="420" cellpadding="0" cellspacing="0" style="background:#0f1e1b;border:1px solid rgba(255,255,255,0.11);border-radius:20px;padding:36px;">
            <tr>
              <td align="center">
                <p style="font-size:22px;font-weight:700;margin:0 0 4px;">
                  <span style="color:#2ec4a0;">Sub</span><span style="color:#5eeac5;">Trakr</span>
                </p>
                <p style="color:#93a8a1;font-size:13px;margin:0 0 28px;">
                  Your verification code
                </p>
                <p style="color:#5b6e68;font-size:12px;text-transform:uppercase;letter-spacing:0.08em;margin:0 0 10px;">
                  Enter this code to continue
                </p>
                <p style="font-family:'DM Mono',monospace;font-size:34px;font-weight:700;letter-spacing:8px;color:#eef5f2;margin:0 0 24px;">
                  {{ .Token }}
                </p>
                <p style="color:#5b6e68;font-size:12px;line-height:1.6;margin:0;">
                  This code expires shortly. If you didn't request this, you can safely ignore this email.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
